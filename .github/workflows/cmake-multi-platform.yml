name: CMake on multiple platforms
"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: "${{ matrix.os }}"
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022
          - macos-14
        build_type:
          - Release
        c_compiler:
          - gcc
          - clang
          - cl
        include:
          - os: ubuntu-24.04
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-24.04
            c_compiler: clang
            cpp_compiler: clang++
          - os: windows-2022
            c_compiler: cl
            cpp_compiler: cl
          - os: macos-14
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: ubuntu-24.04
            c_compiler: cl
          - os: windows-2022
            c_compiler: gcc
          - os: windows-2022
            c_compiler: clang
          - os: macos-14
            c_compiler: cl
          - os: macos-14
            c_compiler: gcc
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: true
      - name: Update APT repository cache
        if: matrix.os == 'ubuntu-24.04'
        run: sudo apt-get update
      - name: Install SDL dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: >-
          sudo apt-get install -y libasound2t64 libasound2-plugins
          libasound2-dev libdecor-0-0 libc6 libdrm2 libgbm1 libpipewire-0.3-0t64
          libpulse0 libsndio7.0 libwayland-client0 libwayland-cursor0
          libwayland-egl1 libwayland-dev libx11-6 libx11-dev libxcursor1 libxext6 libxfixes3 libxi6
          libxkbcommon0 libxrandr2 libxss1
      - name: Install SDL_ttf dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: sudo apt-get install -y libharfbuzz-dev
      - name: Configure CMake
        run: >
          cmake -B build -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} -DCMAKE_BUILD_TYPE=${{
          matrix.build_type }} -S .
      - name: Build
        run: |
          cmake --build build --config ${{ matrix.build_type }}
      - name: Test
        working-directory: build
        run: "ctest --build-config ${{ matrix.build_type }}"
